<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitia Ecosystem</title>
    <link rel="stylesheet" href="style.css">
    <!-- Librairie Ethers.js version 6 (UMD) -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
    <!-- Icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header class="navbar">
        <div class="logo">Fitia<span>Finance</span></div>
        <button id="btn-connect" class="btn-connect">Connecter</button>
        <div id="user-info" class="user-info hidden">
            <span id="wallet-address"></span>
        </div>
    </header>

    <!-- Loader -->
    <div id="loader" class="loader hidden">
        <div class="spinner"></div>
        <p id="loader-text">Transaction en cours...</p>
    </div>

    <!-- Main Container -->
    <main class="container">
        
        <!-- WALLET SECTION -->
        <section id="section-wallet" class="section active">
            <div class="card">
                <h2><i class="fas fa-wallet"></i> Portefeuille</h2>
                <div class="balances-grid">
                    <div class="balance-card">
                        <span>USDT</span>
                        <h3 id="balance-usdt">0.00</h3>
                    </div>
                    <div class="balance-card">
                        <span>FTA</span>
                        <h3 id="balance-fta">0.00</h3>
                    </div>
                </div>
                <div class="form-group">
                    <label>Montant (USDT)</label>
                    <input type="number" id="wallet-amount" placeholder="0.00" />
                    <div class="btn-row">
                        <button id="btn-deposit" class="btn success">Déposer</button>
                        <button id="btn-withdraw" class="btn danger">Retirer</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- TRADING SECTION -->
        <section id="section-trading" class="section hidden">
            <div class="card">
                <h2><i class="fas fa-chart-line"></i> Trading Futures</h2>
                
                <div class="trading-controls">
                    <select id="trade-asset" class="select-styled">
                        <option value="0">BTC/USD</option>
                        <option value="1">ETH/USD</option>
                        <option value="2">FTA/USD</option>
                    </select>
                    
                    <div class="input-group">
                        <label>Marge USDT</label>
                        <input type="number" id="trade-margin" placeholder="10.00" />
                    </div>
                    
                    <div class="leverage-control">
                        <label>Levier: <span id="lev-val">x1</span></label>
                        <input type="range" id="trade-lev" min="1" max="50" value="1" class="slider">
                    </div>
                </div>

                <div class="trade-actions">
                    <button id="btn-long" class="btn-trade long">LONG</button>
                    <button id="btn-short" class="btn-trade short">SHORT</button>
                </div>

                <div class="list-header">Positions Ouvertes</div>
                <div id="positions-list" class="list-container">
                    <p class="empty-msg">Connectez-vous pour voir vos positions.</p>
                </div>
            </div>
        </section>

        <!-- AVIATOR SECTION -->
        <section id="section-aviator" class="section hidden">
            <div class="card avi-bg">
                <h2><i class="fas fa-plane"></i> Aviator Game</h2>
                <div class="aviator-display">
                    <span>FTA BET</span>
                </div>
                <div class="form-group">
                    <input type="number" id="aviator-bet" placeholder="Mise en FTA" />
                    <input type="number" id="aviator-target" placeholder="Multiplicateur Cible (ex: 2.0)" step="0.1" />
                    <button id="btn-play-aviator" class="btn primary full-width">JOUER</button>
                </div>
            </div>
        </section>

        <!-- STAKING SECTION -->
        <section id="section-staking" class="section hidden">
            <div class="card">
                <h2><i class="fas fa-coins"></i> Staking</h2>
                <div class="form-group">
                    <label>ID du Pool (0, 1, 2...)</label>
                    <input type="number" id="stake-pool-id" placeholder="Ex: 0" />
                    <label>Montant</label>
                    <input type="number" id="stake-amount" placeholder="Montant" />
                    <div class="btn-row">
                        <button id="btn-stake" class="btn primary">Staker</button>
                        <button id="btn-unstake" class="btn secondary">Unstake</button>
                    </div>
                </div>
                <p class="info-text">Ex: Pool 0 = USDT->FTA</p>
            </div>
        </section>

        <!-- LENDING SECTION -->
        <section id="section-lending" class="section hidden">
            <div class="card">
                <h2><i class="fas fa-hand-holding-usd"></i> Prêts</h2>
                
                <div class="lend-box">
                    <h4>Déposer Collatéral (USDT)</h4>
                    <input type="number" id="lend-collateral" placeholder="Montant USDT" />
                    <button id="btn-deposit-collat" class="btn full-width">Déposer</button>
                </div>

                <div class="lend-box">
                    <h4>Emprunter (FTA)</h4>
                    <input type="number" id="lend-borrow" placeholder="Montant FTA" />
                    <button id="btn-borrow" class="btn primary full-width">Emprunter</button>
                </div>

                <div class="lend-box">
                    <h4>Rembourser le prêt</h4>
                    <button id="btn-repay" class="btn danger full-width">Rembourser</button>
                </div>
            </div>
        </section>

    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button onclick="navigate('wallet')" class="nav-item active" id="nav-wallet">
            <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </button>
        <button onclick="navigate('trading')" class="nav-item" id="nav-trading">
            <i class="fas fa-chart-bar"></i>
            <span>Trade</span>
        </button>
        <button onclick="navigate('aviator')" class="nav-item" id="nav-aviator">
            <i class="fas fa-plane"></i>
            <span>Aviator</span>
        </button>
        <button onclick="navigate('staking')" class="nav-item" id="nav-staking">
            <i class="fas fa-piggy-bank"></i>
            <span>Stake</span>
        </button>
        <button onclick="navigate('lending')" class="nav-item" id="nav-lending">
            <i class="fas fa-landmark"></i>
            <span>Prêt</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
