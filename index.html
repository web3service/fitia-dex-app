<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b0e11">
    <title>Fitia Finance App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

    <div class="app-screen">
        <header class="app-header">
            <div class="logo">Fitia</div>
            <button id="btn-connect" onclick="connectWallet()" class="btn-connect-header">
                <i class="fas fa-wallet"></i> <span>Connexion</span>
            </button>
            <div id="user-badge" class="user-badge" style="display:none;">
                <div class="dot"></div>
                <span id="user-addr">0x...</span>
            </div>
        </header>

        <main class="app-content">
            <div id="toast"></div>

            <!-- SECTION HOME -->
            <section id="page-home" class="page active">
                <div class="greeting">
                    <h2>Bienvenue</h2>
                    <p>Votre portefeuille Web3</p>
                </div>
                <div class="balance-card">
                    <small>Solde Estimé</small>
                    <h1 id="total-balance">$0.00</h1>
                    <div class="balance-row">
                        <div><span class="token-symbol">USDT</span><p id="bal-usdt-home">0.00000</p></div>
                        <div><span class="token-symbol">FTA</span><p id="bal-fta-home">0.00000</p></div>
                    </div>
                </div>
                <div class="actions-grid">
                    <button onclick="switchPage('trade')" class="action-item blue"><i class="fas fa-chart-line"></i><span>Trading</span></button>
                    <button onclick="switchPage('lend')" class="action-item green"><i class="fas fa-hand-holding-usd"></i><span>Emprunter</span></button>
                    <button onclick="switchPage('stake')" class="action-item purple"><i class="fas fa-coins"></i><span>Staking</span></button>
                    <button onclick="switchPage('aviator')" class="action-item red"><i class="fas fa-plane"></i><span>Aviator</span></button>
                </div>
            </section>

            <!-- SECTION WALLET -->
            <section id="page-wallet" class="page">
                <h3 class="page-title">Mon Portefeuille</h3>
                
                <!-- Carte USDT -->
                <div class="token-card">
                    <div class="token-header">
                        <img src="https://i.ibb.co/BRGx1GN/IMG-20260228-134642-512-x-512-pixel.webp" alt="USDT" class="token-logo">
                        <div class="token-details">
                            <h4>Tether USD</h4>
                            <span class="token-ticker">USDT</span>
                        </div>
                        <div class="token-balance-box">
                            <h3 id="bal-usdt">0.00000</h3>
                        </div>
                    </div>
                    <div class="token-actions">
                        <input type="number" id="inp-usdt" placeholder="Montant USDT">
                        <div class="btn-pair">
                            <button onclick="depositToken('USDT')">Déposer</button>
                            <button onclick="withdrawToken('USDT')" class="outline">Retirer</button>
                        </div>
                    </div>
                </div>

                <!-- Carte FTA -->
                <div class="token-card">
                    <div class="token-header">
                        <img src="https://i.ibb.co/CKc7wbNr/IMG-20260226-152843-512-x-512-pixel.webp" alt="FTA" class="token-logo">
                        <div class="token-details">
                            <h4>Fitia Token</h4>
                            <span class="token-ticker">FTA</span>
                        </div>
                        <div class="token-balance-box">
                            <h3 id="bal-fta">0.00000</h3>
                        </div>
                    </div>
                    <div class="token-actions">
                        <input type="number" id="inp-fta" placeholder="Montant FTA">
                        <div class="btn-pair">
                            <button onclick="depositToken('FTA')">Déposer</button>
                            <button onclick="withdrawToken('FTA')" class="outline">Retirer</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- SECTION TRADING -->
            <section id="page-trade" class="page">
                <h3 class="page-title">Trading Futures</h3>
                <div class="chart-header">
                    <span class="pair-name" id="pair-name-display">BTC/USDT</span>
                    <span id="live-price" class="price-display">---</span>
                </div>
                <div class="chart-box-pro" id="tv-chart-container"></div>
                <div class="trade-form">
                    <div class="form-row">
                        <label>Actif</label>
                        <select id="trade-asset" onchange="changeTradingAsset(this.value)">
                            <option value="0">BTC</option>
                            <option value="1">ETH</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>Marge (USDT)</label>
                        <input type="number" id="trade-margin" placeholder="Ex: 10">
                    </div>
                    <div class="form-row">
                        <label>Levier</label>
                        <div class="leverage-btns">
                            <button onclick="setLev(2)">x2</button>
                            <button onclick="setLev(5)">x5</button>
                            <button onclick="setLev(10)" class="active">x10</button>
                            <button onclick="setLev(20)">x20</button>
                        </div>
                        <input type="hidden" id="trade-lev" value="10">
                    </div>
                    <div class="btn-pair big-btns">
                        <button onclick="openTrade(0)" class="buy-btn"><i class="fas fa-arrow-up"></i> LONG</button>
                        <button onclick="openTrade(1)" class="sell-btn"><i class="fas fa-arrow-down"></i> SHORT</button>
                    </div>
                </div>
            </section>

            <!-- SECTION LENDING -->
            <section id="page-lend" class="page">
                <h3 class="page-title">Emprunter</h3>
                <div class="info-card">
                    <p>Votre collatéral USDT</p>
                    <h2 id="user-collat">0.00000 USDT</h2>
                </div>
                <div class="input-group">
                    <label>Ajouter Collatéral (USDT)</label>
                    <input type="number" id="inp-collat" placeholder="Montant">
                    <button onclick="depositCollateral()" class="full-btn primary">Déposer</button>
                </div>
                <div class="separator"></div>
                <div class="input-group">
                    <label>Emprunter FTA (Ratio 150%)</label>
                    <input type="number" id="inp-borrow" placeholder="Montant FTA">
                    <button onclick="borrowFTA()" class="full-btn accent">Emprunter</button>
                </div>
                <button onclick="repayLoan()" class="full-btn outline-danger" style="margin-top:15px">Rembourser le prêt</button>
            </section>

            <!-- SECTION STAKING -->
            <section id="page-stake" class="page">
                <h3 class="page-title">Staking</h3>
                <div id="pools-list"></div>
            </section>

            <!-- SECTION AVIATOR -->
            <section id="page-aviator" class="page">
                <h3 class="page-title">Aviator Game</h3>
                <div class="game-area">
                    <div class="sky-bg">
                        <div class="plane" id="plane-icon">✈️</div>
                        <div class="multiplier" id="multiplier">1.00x</div>
                    </div>
                    <div class="game-controls">
                        <div class="input-row-2">
                            <input type="number" id="bet-amt" placeholder="Mise FTA">
                            <input type="number" id="target-x" placeholder="Cible (x)">
                        </div>
                        <button onclick="playAviator()" class="play-btn">LANCER LE VOL</button>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-menu">
            <button class="nav-btn active" onclick="switchPage('home')"><i class="fas fa-home"></i><span>Accueil</span></button>
            <button class="nav-btn" onclick="switchPage('trade')"><i class="fas fa-exchange-alt"></i><span>Trade</span></button>
            <button class="nav-btn" onclick="switchPage('wallet')"><i class="fas fa-wallet"></i><span>Wallet</span></button>
            <button class="nav-btn" onclick="switchPage('lend')"><i class="fas fa-landmark"></i><span>Banque</span></button>
            <button class="nav-btn" onclick="switchPage('aviator')"><i class="fas fa-gamepad"></i><span>Jeux</span></button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
