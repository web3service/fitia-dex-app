<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FITIA Finance | Web3 Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header class="app-header">
        <div class="logo">FITIA<span>Finance</span></div>
        <div class="user-meta">
            <div id="user-addr" class="addr-tag">Déconnecté</div>
            <button id="connectBtn" class="btn-connect">Connecter</button>
        </div>
    </header>

    <div class="top-balances">
        <div class="bal-box">FTA: <span id="ui-fta">0.00</span></div>
        <div class="bal-box">USDT: <span id="ui-usdt">0.00</span></div>
    </div>

    <main class="content">
        <section id="dash" class="tab-content active">
            <h2>Gestion du Portefeuille</h2>
            <div class="card">
                <h3>📥 Dépôt vers FITIA Hub</h3>
                <select id="in-token">
                    <option value="FTA">FTA Token</option>
                    <option value="USDT">USDT Stablecoin</option>
                </select>
                <input type="number" id="in-amount" placeholder="Montant à déposer">
                <button class="btn-primary" onclick="deposit()">DÉPOSER</button>
            </div>
            <div class="card">
                <h3>📤 Retrait vers Wallet</h3>
                <select id="out-token">
                    <option value="FTA">FTA Token</option>
                    <option value="USDT">USDT Stablecoin</option>
                </select>
                <input type="number" id="out-amount" placeholder="Montant à retirer">
                <button class="btn-primary" onclick="withdraw()">RETIRER</button>
            </div>
        </section>

        <section id="trade" class="tab-content">
            <div id="tradingview_chart" class="chart-container"></div>
            <div class="card trade-form">
                <div class="trade-inputs">
                    <input type="number" id="tr-marge" placeholder="Marge USDT">
                    <div class="lev-display">Levier: <span id="lev-ui">10</span>x</div>
                    <input type="range" min="1" max="50" value="10" id="tr-lev" oninput="document.getElementById('lev-ui').innerText=this.value">
                </div>
                <div class="btn-group">
                    <button class="btn-long" onclick="trade(0)">LONG</button>
                    <button class="btn-short" onclick="trade(1)">SHORT</button>
                </div>
            </div>
        </section>

        <section id="game" class="tab-content">
            <div class="game-display">
                <div id="aviator-screen">1.00x</div>
            </div>
            <div class="card">
                <div class="input-row">
                    <input type="number" id="av-mise" placeholder="Mise FTA">
                    <input type="number" id="av-target" placeholder="Auto Cashout (ex: 2.0)">
                </div>
                <button class="btn-play" onclick="playAviator()">PLACER LE PARI</button>
            </div>
        </section>

        <section id="earn" class="tab-content">
            <div class="card">
                <h2>💎 Staking FTA</h2>
                <p>Gagnez 15% APY sur vos FTA.</p>
                <input type="number" id="st-amount" placeholder="FTA à staker">
                <button class="btn-primary" onclick="stake(0)">DÉMARRER LE STAKING</button>
            </div>
            <div class="card">
                <h2>🏦 Prêts (Lending)</h2>
                <input type="number" id="ln-col" placeholder="USDT (Collatéral)">
                <button class="btn-long" onclick="depositCollateral()">DÉPOSER GARANTIE</button>
                <input type="number" id="ln-bor" placeholder="FTA à emprunter" style="margin-top:15px">
                <button class="btn-primary" onclick="borrow()">EMPRUNTER</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('dash', this)">🏦<span>Wallet</span></div>
        <div class="nav-item" onclick="switchTab('trade', this)">📈<span>Trade</span></div>
        <div class="nav-item" onclick="switchTab('game', this)">🚀<span>Aviator</span></div>
        <div class="nav-item" onclick="switchTab('earn', this)">💎<span>Earn</span></div>
    </nav>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="app.js"></script>
</body>
</html>
